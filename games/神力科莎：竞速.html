                }
            } catch (error) {
                console.error('[GameDetail] 加载游戏数据失败:', error);
                // 显示错误状态
                const placeholder = document.getElementById('gameCoverPlaceholder');
                if (placeholder) placeholder.innerHTML = '<i class="fas fa-exclamation-triangle" style="font-size:48px; margin-bottom:10px;"></i><br>加载失败';
            }
        }
        
        // 搜索功能
        function handleSearch(event) {
            if (event.key === 'Enter') {
                searchGame();
            }
        }
        
        function searchGame() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (keyword) {
                window.location.href = '../?search=' + encodeURIComponent(keyword);
            }
        }
        
        // 登录功能
        function showLogin() {
            alert('登录功能暂未实现，请返回首页登录');
        }
        
        function checkLoginStatus() {
            const currentUser = localStorage.getItem('gamebox_user');
            const userSection = document.getElementById('userSection');
            if (currentUser) {
                userSection.innerHTML = '<div class="user-info"><i class="fas fa-user"></i><span>' + currentUser + '</span></div>';
            }
        }

        // 加载游戏系列
        async function loadGameSeries() {
            return new Promise(async (resolve) => {
            try {
                console.log('正在加载游戏系列...');
                const response = await fetch('../game-series.json');
                if (!response.ok) {
                    console.error('加载 game-series.json 失败:', response.status);
                    resolve();
                    return;
                }
                const seriesData = await response.json();
                console.log('game-series.json 加载成功, 系列数:', Object.keys(seriesData).length);
                const currentGame = document.querySelector('.game-title').textContent.trim();
                console.log('当前游戏:', currentGame);
                
                let currentSeries = '';
                for (const [seriesName, games] of Object.entries(seriesData)) {
                    // 模糊匹配：提取游戏名称的核心部分（去除版本号、符号等）
                    const isMatch = games.some(g => {
                        // 直接包含匹配
                        if (currentGame.includes(g) || g.includes(currentGame)) return true;
                        
                        // 提取核心名称（去除冒号、斜杠、加号等符号后的第一部分）
                        const currentCore = currentGame.split(/[：:\/\+_]/)[0].trim();
                        const gameCore = g.split(/[：:\/\+_]/)[0].trim();
                        
                        // 核心名称匹配
                        if (currentCore === gameCore) return true;
                        if (currentCore.includes(gameCore) || gameCore.includes(currentCore)) return true;
                        
                        return false;
                    });
                    
                    if (isMatch) {
                        currentSeries = seriesName;
                        console.log('找到系列:', currentSeries);
                        break;
                    }
                }
                
                if (currentSeries) {
                    const seriesGames = seriesData[currentSeries].filter(g => !currentGame.includes(g) && !g.includes(currentGame));
                    if (seriesGames.length > 0) {
                        const seriesHtml = `
                            <div class="game-series-section">
                                <h3 class="series-title"><i class="fas fa-layer-group"></i> ${currentSeries}</h3>
                                <div class="series-games">
                                    ${seriesGames.map(game => `<a href="${encodeURIComponent(game)}.html" class="series-game-item">${game}</a>`).join('')}
                                </div>
                            </div>
                        `;
                        document.querySelector('.container').insertAdjacentHTML('beforeend', seriesHtml);
                    }
                }
            } catch (e) {
                console.log('加载系列失败:', e);
            }
            resolve();
            });
        }
        // 添加免责声明（在游戏系列之后）
        function addDisclaimer() {
            const disclaimerHtml = `
                <div class="disclaimer" style="margin-top: 40px; padding: 20px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color);">
                    <h4 style="color: var(--accent-blue); text-align: center; margin-bottom: 12px; font-size: 14px;"># 免责声明 #</h4>
                    <p style="font-size: 11px; color: var(--text-secondary); line-height: 1.8; text-align: justify;">
                        本站提供的资源转载自国内外各大媒体和网络，仅供试玩体验；不得将上述内容用于商业或者非法用途，否则，一切后果请用户自负。您必须在下载后的24个小时之内，从您的电脑中彻底删除上述内容。如果您喜欢该游戏内容，请支持正版，购买注册，得到更好的正版服务。我们非常重视版权问题，如有侵权请邮件与我们联系处理。敬请谅解！E-mail：<a href="mailto:danjiyouxihezi@gmail.com" style="color: var(--accent-blue);">danjiyouxihezi@gmail.com</a>
                    </p>
                </div>
            `;
            document.querySelector('.container').insertAdjacentHTML('beforeend', disclaimerHtml);
        }
        
        // 设置返回链接（带页码参数）
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');
        const filter = urlParams.get('filter');
        if (page) {
            let backUrl = '../';
            const params = [];
            if (page) params.push(`page=${page}`);
            if (filter && filter !== 'all') params.push(`filter=${filter}`);
            if (params.length > 0) backUrl += '?' + params.join('&');
            document.getElementById('backLink').href = backUrl;
        }
        
        // 先加载游戏系列，然后添加免责声明
        loadGameSeries().then(addDisclaimer).catch(addDisclaimer);
    </script>
</body>
</html>
