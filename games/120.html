    <script>
        // 鏀惰棌鍔熻兘 - 浣跨敤涓庝富椤电浉鍚岀殑 localStorage key
        const FAVORITES_KEY = 'gamebox_local_favorites';
        
        function toggleFavorite() {
            const gameId = '120';
            let favorites = JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
            const btn = document.querySelector('.action-btn.favorite');
            const text = document.getElementById('favText');
            const icon = btn.querySelector('i');
            
            if (favorites.includes(gameId)) {
                favorites = favorites.filter(id => id !== gameId);
                btn.classList.remove('active');
                text.textContent = '鏀惰棌';
                icon.className = 'far fa-heart';
                showToast('宸插彇娑堟敹钘?, 'info');
            } else {
                favorites.push(gameId);
                btn.classList.add('active');
                text.textContent = '宸叉敹钘?;
                icon.className = 'fas fa-heart';
                showToast('宸叉坊鍔犲埌鏀惰棌澶?, 'success');
            }
            
            localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
            
            // 鍙戦€佹秷鎭€氱煡涓婚〉鏇存柊鏀惰棌鐘舵€侊紙濡傛灉涓婚〉鍦?opener 涓級
            if (window.opener) {
                window.opener.postMessage({ type: 'favoriteChanged', gameId: gameId, isFav: favorites.includes(gameId) }, '*');
            }
        }
        
        // 鏄剧ず鎻愮ず娑堟伅
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: ${type === 'success' ? '#10b981' : '#3b82f6'};
                color: white;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        // 涓婚鍒囨崲鍔熻兘
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const currentTheme = html.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                // 褰撳墠鏄櫧澶╋紝鍒囨崲鍒板鏅氭ā寮忥紝鏄剧ず鏈堜寒
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                // 褰撳墠鏄鏅氾紝鍒囨崲鍒扮櫧澶╂ā寮忥紝鏄剧ず澶槼
                html.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light');
            }
        }
        
        // 椤甸潰鍔犺浇鏃跺簲鐢ㄤ繚瀛樼殑涓婚

        // 鍔犺浇娓告垙绯诲垪
        async function loadGameSeries() {
            return new Promise(async (resolve) => {
            try {
                console.log('姝ｅ湪鍔犺浇娓告垙绯诲垪...');
                const response = await fetch('../game-series.json');
                if (!response.ok) {
                    console.error('鍔犺浇 game-series.json 澶辫触:', response.status);
                    resolve();
                    return;
                }
                const seriesData = await response.json();
                console.log('game-series.json 鍔犺浇鎴愬姛, 绯诲垪鏁?', Object.keys(seriesData).length);
                const currentGame = document.querySelector('.game-title').textContent.trim();
                console.log('褰撳墠娓告垙:', currentGame);
                
                let currentSeries = '';
                for (const [seriesName, games] of Object.entries(seriesData)) {
                    // 妯＄硦鍖归厤锛氭彁鍙栨父鎴忓悕绉扮殑鏍稿績閮ㄥ垎锛堝幓闄ょ増鏈彿銆佺鍙风瓑锛?
                    const isMatch = games.some(g => {
                        // 鐩存帴鍖呭惈鍖归厤
                        if (currentGame.includes(g) || g.includes(currentGame)) return true;
                        
                        // 鎻愬彇鏍稿績鍚嶇О锛堝幓闄ゅ啋鍙枫€佹枩鏉犮€佸姞鍙风瓑绗﹀彿鍚庣殑绗竴閮ㄥ垎锛?
                        const currentCore = currentGame.split(/[锛?\/\+_]/)[0].trim();
                        const gameCore = g.split(/[锛?\/\+_]/)[0].trim();
                        
                        // 鏍稿績鍚嶇О鍖归厤
                        if (currentCore === gameCore) return true;
                        if (currentCore.includes(gameCore) || gameCore.includes(currentCore)) return true;
                        
                        return false;
                    });
                    
                    if (isMatch) {
                        currentSeries = seriesName;
                        console.log('鎵惧埌绯诲垪:', currentSeries);
                        break;
                    }
                }
                
                if (currentSeries) {
                    const seriesGames = seriesData[currentSeries].filter(g => !currentGame.includes(g) && !g.includes(currentGame));
                    if (seriesGames.length > 0) {
                        const seriesHtml = `
                            <div class="game-series-section">
                                <h3 class="series-title"><i class="fas fa-layer-group"></i> ${currentSeries}</h3>
                                <div class="series-games">
                                    ${seriesGames.map(game => `<a href="${encodeURIComponent(game)}.html" class="series-game-item">${game}</a>`).join('')}
                                </div>
                            </div>
                        `;
                        document.querySelector('.container').insertAdjacentHTML('beforeend', seriesHtml);
                    }
                }
            } catch (e) {
                console.log('鍔犺浇绯诲垪澶辫触:', e);
            }
            resolve();
            });
        }
