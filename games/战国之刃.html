    <script>
        // 收藏功能
        function toggleFavorite() {
            const gameId = '1956';
            let favorites = JSON.parse(localStorage.getItem('gamebox_favorites') || '[]');
            const btn = document.querySelector('.action-btn.favorite');
            const text = document.getElementById('favText');
            const icon = btn.querySelector('i');
            
            if (favorites.includes(gameId)) {
                favorites = favorites.filter(id => id !== gameId);
                btn.classList.remove('active');
                text.textContent = '收藏';
                icon.className = 'far fa-heart';
                alert('已取消收藏');
            } else {
                favorites.push(gameId);
                btn.classList.add('active');
                text.textContent = '已收藏';
                icon.className = 'fas fa-heart';
                alert('已添加到收藏夹');
            }
            
            localStorage.setItem('gamebox_favorites', JSON.stringify(favorites));
        }
        
        // 主题切换功能
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const currentTheme = html.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                // 当前是白天，切换到夜晚模式，显示月亮
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                // 当前是夜晚，切换到白天模式，显示太阳
                html.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light');
            }

        function checkLoginStatus() {
            const currentUser = localStorage.getItem('gamebox_user');
            const userSection = document.getElementById('userSection');

                userSection.innerHTML = '<div class="user-info"><i class="fas fa-user"></i><span>' + currentUser + '</span></div>';
            }

        // 加载游戏系列
        async function loadGameSeries() {
            return new Promise(async (resolve) => {
            try {
                console.log('正在加载游戏系列...');
                const response = await fetch('../game-series.json');
                if (!response.ok) {
                    console.error('加载 game-series.json 失败:', response.status);
                    resolve();
                    return;
                }
                const seriesData = await response.json();
                console.log('game-series.json 加载成功, 系列数:', Object.keys(seriesData).length);
                const currentGame = document.querySelector('.game-title').textContent.trim();
                console.log('当前游戏:', currentGame);
                
                let currentSeries = '';
                for (const [seriesName, games] of Object.entries(seriesData)) {
                    // 模糊匹配：提取游戏名称的核心部分（去除版本号、符号等）
                    const isMatch = games.some(g => {
                        // 直接包含匹配
                        if (currentGame.includes(g) || g.includes(currentGame)) return true;
                        
                        // 提取核心名称（去除冒号、斜杠、加号等符号后的第一部分）
                        const currentCore = currentGame.split(/[：:\/\+_]/)[0].trim();
                        const gameCore = g.split(/[：:\/\+_]/)[0].trim();
                        
                        // 核心名称匹配
                        if (currentCore === gameCore) return true;
                        if (currentCore.includes(gameCore) || gameCore.includes(currentCore)) return true;
                        
                        return false;
                    });
                    
                    if (isMatch) {
                        currentSeries = seriesName;
                        console.log('找到系列:', currentSeries);
                        break;
                    }
                }
                
                if (currentSeries) {
                    const seriesGames = seriesData[currentSeries].filter(g => !currentGame.includes(g) && !g.includes(currentGame));
                    if (seriesGames.length > 0) {
                        const seriesHtml = `
                            <div class="game-series-section">
                                <h3 class="series-title"><i class="fas fa-layer-group"></i> ${currentSeries}</h3>
                                <div class="series-games">
                                    ${seriesGames.map(game => `<a href="${encodeURIComponent(game)}.html" class="series-game-item">${game}</a>`).join('')}
                                </div>
                            </div>
                        `;
                        document.querySelector('.container').insertAdjacentHTML('beforeend', seriesHtml);
                    }
                }
            } catch (e) {
                console.log('加载系列失败:', e);
            }
            resolve();
            });
        }

                    <h4 style="color: var(--accent-blue); text-align: center; margin-bottom: 12px; font-size: 14px;"># 免责声明 #</h4>
                    <p style="font-size: 11px; color: var(--text-secondary); line-height: 1.8; text-align: justify;">
                        本站提供的资源转载自国内外各大媒体和网络，仅供试玩体验；不得将上述内容用于商业或者非法用途，否则，一切后果请用户自负。您必须在下载后的24个小时之内，从您的电脑中彻底删除上述内容。如果您喜欢该游戏内容，请支持正版，购买注册，得到更好的正版服务。我们非常重视版权问题，如有侵权请邮件与我们联系处理。敬请谅解！E-mail：<a href="mailto:danjiyouxihezi@gmail.com" style="color: var(--accent-blue);">danjiyouxihezi@gmail.com</a>
                    </p>
                </div>
            `;
            document.querySelector('.container').insertAdjacentHTML('beforeend', disclaimerHtml);
        }
        
        // 设置返回链接（带页码参数）
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');
        const filter = urlParams.get('filter');
        if (page) {
            let backUrl = '../';
            const params = [];
            if (page) params.push(`page=${page}`);
            if (filter && filter !== 'all') params.push(`filter=${filter}`);
            if (params.length > 0) backUrl += '?' + params.join('&');
            document.getElementById('backLink').href = backUrl;
        }
        
        // 先加载游戏系列，然后添加免责声明
        loadGameSeries().then(addDisclaimer).catch(addDisclaimer);

        // ========== 动态加载最新数据 ==========
        (async function loadDynamicData() {
            const gameId = '1956';
            if (!gameId || gameId === '1956') {
                document.getElementById('loadingOverlay').classList.add('hidden');
                return;
            }
            
            try {
                console.log('[动态加载] 正在从 Worker API 获取游戏数据...');
                const response = await fetch('https://api.djgamebox.com/api/games');
                if (!response.ok) throw new Error('API 请求失败: ' + response.status);
                
                const result = await response.json();
                if (!result.success || !Array.isArray(result.data)) {
                    throw new Error('API 返回格式错误');
                }
                
                // 查找当前游戏
                const game = result.data.find(g => String(g.id) === String(gameId));
                if (!game) {
                    console.log('[动态加载] 未找到游戏 ID:', gameId);
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    return;
                }
                
                console.log('[动态加载] 获取到最新数据:', game.cn || game.name);
                
                // 字段映射 (Worker API 格式 -> 网页格式)
                const name = game.cn || game.name || document.getElementById('gameName').textContent;
                const nameEn = game.en || game.nameEn || '';
                const category = game.type || game.category || document.getElementById('gameCategory').textContent;
                const size = game.size || document.getElementById('gameSize').textContent;
                const updateTime = game.update || game.updateTime;
                const desc = game.desc || game.description || '';
                const cover = game.cover || document.getElementById('gameCover').src;
                
                // 更新 DOM
                document.getElementById('gameName').textContent = name;
                document.getElementById('breadcrumbName').textContent = name;
                document.title = name + ' - 游戏下载 - 游戏盒子';
                
                if (nameEn) {
                    document.getElementById('gameNameEn').textContent = nameEn;
                    document.getElementById('gameNameEn').style.display = 'block';
                }
                
                document.getElementById('gameCategory').textContent = category;
                document.getElementById('gameSize').textContent = size || '未知';
                
                // 格式化更新时间
                if (updateTime) {
                    const date = new Date(Number(updateTime));
                    if (!isNaN(date.getTime())) {
                        document.getElementById('gameDate').textContent = date.toLocaleDateString('zh-CN');
                    }
                }
                
                // 更新封面
                if (cover) {
                    document.getElementById('gameCover').src = cover;
                    document.getElementById('gameCover').style.display = 'block';
                }
                
                // 更新下载链接
                const downloadContainer = document.getElementById('downloadButtons');
                if (downloadContainer && (game.link1 || game.baiduLink1)) {
                    let linksHtml = '';
                    const link1 = game.link1 || game.baiduLink1;
                    const link2 = game.link2 || game.baiduLink2;
                    const link3 = game.link3 || game.thunderLink;
                    
                    if (link1) {
                        linksHtml += `<a href="${link1}" target="_blank" class="download-btn baidu"><i class="fas fa-cloud"></i>百度网盘下载</a>`;
                    }
                    if (link2) {
                        linksHtml += `<a href="${link2}" target="_blank" class="download-btn baidu"><i class="fas fa-cloud"></i>百度网盘备用</a>`;
                    }
                    if (link3) {
                        linksHtml += `<a href="${link3}" target="_blank" class="download-btn thunder"><i class="fas fa-bolt"></i>迅雷下载</a>`;
                    }
                    
                    if (linksHtml) {
                        downloadContainer.innerHTML = linksHtml;
                    }
                }
                
                // 更新描述
                if (desc) {
                    const descEl = document.getElementById('gameDesc');
                    if (descEl) descEl.textContent = desc;
                }
                
                console.log('[动态加载] 数据更新完成');
            } catch (err) {
                console.log('[动态加载] 失败，使用静态数据:', err.message);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        })();
    </script>
</body>
</html>
